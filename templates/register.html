<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="navbar">
        Dyscalculia Detection System
    </div>

    <div class="container">

        <div class="card center">

            <h2>Register</h2>

            {% if error %}
            <p style="color:red;font-weight:bold;text-align:center;">
                {{ error }}
            </p>
            {% endif %}

            <form method="POST">

                <div class="form-group">
                    <label>Email</label>
                    <input name="email" placeholder="Enter Email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter Password" required>
                </div>

                <!-- ✅ ADDED AGE -->
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Enter Age" required>
                </div>

                <div class="form-group">
                    <label>Select Role</label>

                    <select name="role" onchange="toggleFields(this.value)" required>
                        <option value="">Select Role</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Parent">Parent</option>
                    </select>

                </div>

                <br>

                <!-- ✅ WRAPPED FOR CONDITION -->
                <div id="studentFields">

                    <label>Assign Teacher</label>

                    <select name="teacher_id">
                        <option value="">None</option>
                        {% for t in teachers %}
                        <option value="{{ t.id }}">{{ t.email }}</option>
                        {% endfor %}
                    </select>

                    <br><br>

                    <label>Assign Parent</label>

                    <select name="parent_id">
                        <option value="">None</option>
                        {% for p in parents %}
                        <option value="{{ p.id }}">{{ p.email }}</option>
                        {% endfor %}
                    </select>

                </div>

                <br><br>

                <button class="btn btn-primary" type="submit">
                    Register
                </button>

            </form>

            <br>

            <p>
                Already have an account?
                <a href="/login">Login here</a>
            </p>

        </div>

    </div>

    <!-- ✅ SCRIPT ADDED -->
    <script>
        function toggleFields(role) {
            document.getElementById("studentFields").style.display =
                role === "Student" ? "block" : "none";
        }
    </script>

</body>

</html>
