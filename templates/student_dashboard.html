<!DOCTYPE html>
<html>

<head>

    <title>Student Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="navbar">
        Dyscalculia Detection System
    </div>

    <div class="container">

        <h2>Student Dashboard</h2>

        <p class="center">Welcome <b>{{ user }}</b></p>

        <div class="dashboard-grid">

            <div class="dashboard-card">

                <h3>Full Cognitive Test</h3>

                <p>Symbolic + ANS + Working Memory</p>

                <a href="{{ url_for('start_cognitive') }}" class="btn">
                    Start Assessment
                </a>

            </div>

            <div class="dashboard-card">

                <h3>View History</h3>

                <p>See your previous test results</p>

                <a href="{{ url_for('history') }}" class="btn btn-success">
                    View History
                </a>

            </div>

            <div class="dashboard-card">

                <h3>Logout</h3>

                <p>Exit your account</p>

                <a href="{{ url_for('logout') }}" class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

    </div>

</body>

</html>
