<!DOCTYPE html>
<html>

<head>
    <title>Number Distance Test</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .container {
            margin-top: 100px;
        }

        .number-btn {
            font-size: 42px;
            padding: 25px 60px;
            margin: 40px;
            border: none;
            border-radius: 10px;
            background: #9b59b6;
            color: white;
            cursor: pointer;
        }

        .number-btn:hover {
            background: #8e44ad;
        }

        .trial {
            font-size: 20px;
            margin-bottom: 20px;
        }
    </style>

    <script>

        let startTime;

        window.onload = function () {
            startTime = new Date().getTime();
        }

        function choose(side) {

            let endTime = new Date().getTime();
            let rt = (endTime - startTime) / 1000;

            document.getElementById("choice").value = side;
            document.getElementById("response_time").value = rt;

            document.getElementById("form").submit();
        }

    </script>

</head>

<body>

    <div class="container">

        <h1>Number Distance Test</h1>

        <p class="trial">Trial {{trial}} / 10</p>

        <p>
            Choose the larger number as quickly as possible
        </p>

        <form id="form" method="POST" action="/submit_distance">

            <input type="hidden" name="choice" id="choice">
            <input type="hidden" name="response_time" id="response_time">

            <button type="button" class="number-btn" onclick="choose('left')">
                {{left}}
            </button>

            <button type="button" class="number-btn" onclick="choose('right')">
                {{right}}
            </button>

        </form>

    </div>

</body>

</html>
