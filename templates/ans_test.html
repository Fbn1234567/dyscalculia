<!DOCTYPE html>
<html>

<head>
    <title>ANS Dot Comparison Test</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .container {
            margin-top: 50px;
        }

        .canvas-box {
            display: inline-block;
            margin: 30px;
            cursor: pointer;
        }

        canvas {
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
    </style>

    <script>

        let startTime;

        window.onload = function () {

            startTime = new Date().getTime();

            drawDots("leftCanvas", {{ left }});
        drawDots("rightCanvas", {{ right }});

}

        function drawDots(canvasId, count) {

            let canvas = document.getElementById(canvasId);
            let ctx = canvas.getContext("2d");

            for (let i = 0; i < count; i++) {

                let x = Math.random() * 180 + 10;
                let y = Math.random() * 180 + 10;

                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = "black";
                ctx.fill();

            }

        }

        function choose(side) {

            let endTime = new Date().getTime();
            let rt = (endTime - startTime) / 1000;

            document.getElementById("choice").value = side;
            document.getElementById("response_time").value = rt;

            document.getElementById("form").submit();

        }

    </script>

</head>

<body>

    <div class="container">

        <h1>Dot Comparison Test</h1>

        <h3>Trial {{trial}} / 10</h3>

        <p>Click the side with more dots</p>

        <form id="form" method="POST" action="/submit_ans">

            <input type="hidden" name="choice" id="choice">
            <input type="hidden" name="response_time" id="response_time">

            <div class="canvas-box" onclick="choose('left')">
                <canvas id="leftCanvas" width="200" height="200"></canvas>
            </div>

            <div class="canvas-box" onclick="choose('right')">
                <canvas id="rightCanvas" width="200" height="200"></canvas>
            </div>

        </form>

    </div>

</body>

</html>
