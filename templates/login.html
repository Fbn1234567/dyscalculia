<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* centre the login card nicely */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            border: 1px solid #cbd5e1;
        }

        .login-card h2 {
            font-size: 28px;
            margin-bottom: 28px;
            color: #1e293b;
        }

        .login-card label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .login-card input {
            margin-bottom: 20px;
        }

        .login-card .btn {
            width: 100%;
            text-align: center;
            padding: 13px;
            font-size: 15px;
            margin-top: 8px;
        }

        .login-card .register-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #475569;
        }

        .login-card .register-link a {
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
        }

        .login-card .register-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="navbar">
        Dyscalculia Detection System
    </div>

    <div class="login-wrapper">
        <div class="login-card">

            <h2>Login</h2>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <button class="btn btn-primary" type="submit">Login</button>

            </form>

            <p class="register-link">
                Don't have an account? <a href="/register">Register</a>
            </p>

        </div>
    </div>

</body>

</html>
